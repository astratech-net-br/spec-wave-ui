name: Generate Spec

on:
  issues:
    types: [labeled]

jobs:
  generate-spec:
    if: >
      github.event.label.name == 'spec-wave:spec' &&
      contains(github.event.issue.title, '[FEATURE]')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Checkout spec-wave CLI
        uses: actions/checkout@v4
        with:
          repository: moacsjr/spec-wave
          ref: feat/persistent-config-and-commands
          path: .spec-wave-cli

      - name: Install spec-wave CLI
        run: npm install --prefix .spec-wave-cli

      - name: Generate spec.md
        run: node .spec-wave-cli/packages/spec-wave/bin/spec-wave.mjs generate-spec --issue-number ${{ github.event.issue.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
